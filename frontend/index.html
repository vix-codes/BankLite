<!DOCTYPE html>
<html>
<head>
    <title>BankLite API Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 5px;
        }

        .box {
            background: white;
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 15px;
        }

        input, button {
            padding: 8px;
            margin: 5px;
        }

        button {
            cursor: pointer;
        }

        pre {
            background: #222;
            color: white;
            padding: 15px;
            min-height: 120px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>BankLite API Test</h1>
    <p>Simple page for testing the Spring Boot banking APIs.</p>

    <div class="box">
        <h3>Create Account</h3>
        <input id="name" placeholder="Name">
        <input id="balance" type="number" placeholder="Opening balance">
        <button onclick="createAccount()">Create</button>
    </div>

    <div class="box">
        <h3>Deposit</h3>
        <input id="depositId" type="number" placeholder="Account id">
        <input id="depositAmount" type="number" placeholder="Amount">
        <button onclick="deposit()">Deposit</button>
    </div>

    <div class="box">
        <h3>Withdraw</h3>
        <input id="withdrawId" type="number" placeholder="Account id">
        <input id="withdrawAmount" type="number" placeholder="Amount">
        <button onclick="withdraw()">Withdraw</button>
    </div>

    <div class="box">
        <h3>Transfer</h3>
        <input id="fromId" type="number" placeholder="From account id">
        <input id="toId" type="number" placeholder="To account id">
        <input id="transferAmount" type="number" placeholder="Amount">
        <button onclick="transferMoney()">Transfer</button>
    </div>

    <div class="box">
        <h3>Transaction History</h3>
        <input id="historyId" type="number" placeholder="Account id">
        <button onclick="getTransactions()">Get Transactions</button>
    </div>

    <h3>Result</h3>
    <pre id="result">Output will show here...</pre>

    <script>
        var api = "http://143.198.160.235:8080";

        function show(data) {
            document.getElementById("result").textContent = JSON.stringify(data, null, 2);
        }

        function showError(error) {
            show({ error: error.message });
        }

        function post(path, params) {
            return fetch(api + path, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams(params)
            }).then(function(response) {
                return response.json();
            });
        }

        function createAccount() {
            post("/accounts", {
                name: document.getElementById("name").value,
                balance: document.getElementById("balance").value || 0
            }).then(show).catch(showError);
        }

        function deposit() {
            post("/accounts/" + document.getElementById("depositId").value + "/deposit", {
                amount: document.getElementById("depositAmount").value
            }).then(show).catch(showError);
        }

        function withdraw() {
            post("/accounts/" + document.getElementById("withdrawId").value + "/withdraw", {
                amount: document.getElementById("withdrawAmount").value
            }).then(show).catch(showError);
        }

        function transferMoney() {
            post("/transfer", {
                fromAccountId: document.getElementById("fromId").value,
                toAccountId: document.getElementById("toId").value,
                amount: document.getElementById("transferAmount").value
            }).then(show).catch(showError);
        }

        function getTransactions() {
            fetch(api + "/accounts/" + document.getElementById("historyId").value + "/transactions")
                .then(function(response) {
                    return response.json();
                })
                .then(show)
                .catch(showError);
        }
    </script>
</body>
</html>
