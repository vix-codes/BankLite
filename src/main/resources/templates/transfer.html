<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Transfer</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <a class="navbar-brand" href="/">BankLite</a>
    <div class="navbar-nav">
        <a class="nav-link" href="/">Dashboard</a>
        <a class="nav-link" href="/web/accounts/new">Create Account</a>
        <a class="nav-link" href="/web/deposit">Deposit</a>
        <a class="nav-link" href="/web/withdraw">Withdraw</a>
        <a class="nav-link" href="/web/transfer">Transfer</a>
    </div>
</nav>

<div class="container">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card">
        <div class="card-header bg-secondary text-white">Transfer Money</div>
        <div class="card-body">
            <form action="/web/transfer" method="post">
                <div class="form-group">
                    <label>From Account</label>
                    <select name="fromAccountId" class="form-control" required>
                        <option th:each="account : ${accounts}"
                                th:value="${account.id}"
                                th:text="|${account.id} - ${account.name} (Balance: ${#numbers.formatDecimal(account.balance, 1, 2)})|">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>To Account</label>
                    <select name="toAccountId" class="form-control" required>
                        <option th:each="account : ${accounts}"
                                th:value="${account.id}"
                                th:text="|${account.id} - ${account.name} (Balance: ${#numbers.formatDecimal(account.balance, 1, 2)})|">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" name="amount" class="form-control" step="0.01" min="0.01" required>
                </div>
                <button type="submit" class="btn btn-primary">Transfer</button>
                <a href="/" class="btn btn-light">Cancel</a>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
